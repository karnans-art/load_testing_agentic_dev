# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Final summary (always runs)
# Posts combined results regardless of pass/fail.
# ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Post Results
    runs-on: ubuntu-latest
    needs: [smoke]
    if: always()                 # ← runs even if smoke or full-flow failed

    steps:
      - name: Final summary
        run: |
          echo "## CDS Post-Deploy Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke (30s gate) | ${{ needs.smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event.client_payload.actor || github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy SHA:** \`${{ github.event.client_payload.sha || github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.client_payload.environment || inputs.environment || 'uat' }}" >> $GITHUB_STEP_SUMMARY
