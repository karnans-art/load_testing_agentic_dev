name: CDS Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/cds/**'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v1.7.1/k6-v1.7.1-linux-amd64.tar.gz | tar xz
          sudo mv k6-v1.7.1-linux-amd64/k6 /usr/local/bin/
          k6 version

      - name: Run CDS Smoke Test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: k6 run -e BASE_URL=$BASE_URL -e TEST_EMAIL=$TEST_EMAIL -e TEST_PASSWORD=$TEST_PASSWORD apps/cds/scripts/smoke.js
